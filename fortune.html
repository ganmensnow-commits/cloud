      0%, 100% { opacity: 1; }

    }

    .hide-for-record {
      display: none !important;
    }
  </style>

      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;

    // 日本語音声を取得
    function getJapaneseVoice() {
      const voices = speechSynthesis.getVoices();
      // 優先順: macOS日本語 > その他日本語
      const preferred = voices.find(v => v.lang === 'ja-JP' && v.name.includes('Kyoko'));
      if (preferred) return preferred;
      const jp = voices.find(v => v.lang === 'ja-JP' || v.lang.startsWith('ja'));
      return jp || null;

    // 読み上げ実行（Promiseで完了を通知）
    function speakText(text) {
      return new Promise((resolve) => {
        if (!speechEnabled || !text) { resolve(); return; }

        // 前の読み上げがあれば停止
        speechSynthesis.cancel();

        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'ja-JP';
        utter.rate = 0.95;  // 少しゆっくり
        utter.pitch = 1.1;  // やや高め（占い師っぽく）
        utter.volume = 1.0;

        const voice = getJapaneseVoice();
        if (voice) utter.voice = voice;

        // BGMの音量を下げる
        if (bgmMasterGainNode && audioCtx) {
          bgmMasterGainNode.gain.linearRampToValueAtTime(0.04, audioCtx.currentTime + 0.3);
        }

        isSpeaking = true;
        currentUtterance = utter;

        utter.onend = () => {
          isSpeaking = false;
          currentUtterance = null;
          // BGMの音量を戻す
          if (bgmMasterGainNode && audioCtx) {
            bgmMasterGainNode.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.5);
          }
          resolve();
        };
        utter.onerror = () => {
          isSpeaking = false;
          currentUtterance = null;
          if (bgmMasterGainNode && audioCtx) {
            bgmMasterGainNode.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.3);
          }
          resolve();
        };

        // 少し間を置いてから読み上げ開始（アニメーションを見せるため）
        setTimeout(() => {
          speechSynthesis.speak(utter);
        }, 800);
      });
    }

    // 読み上げ停止
    function stopSpeech() {
      speechSynthesis.cancel();
      isSpeaking = false;
      currentUtterance = null;
    }

    // 音声リスト読み込み（一部ブラウザで非同期）
    speechSynthesis.onvoiceschanged = () => { getJapaneseVoice(); };

    // === スライド制御 ===

    const MIN_SLIDE_DURATION = 3000; // 読み上げ後の最低表示時間
    let autoTimer = null;
    let isTransitioning = false; // スライド移動中フラグ

    function goToSlide(index) {
      if (index < 0 || index >= totalSlides) return;
      if (isTransitioning) return;

      // 前の読み上げを停止
      stopSpeech();

      slides[currentSlide].classList.remove('active');
      dots[currentSlide].classList.remove('active');

      currentSlide = index;

      // アニメーションリセット
      const slide = slides[currentSlide];
      const parent = slide.parentNode;
      const clone = slide.cloneNode(true);
      clone.classList.add('active');
      parent.replaceChild(clone, slide);
      slides[currentSlide] = clone;

      dots[currentSlide].classList.add('active');
      updateProgress();

      // 自動タイマーをクリア
      clearTimeout(autoTimer);

      // 読み上げ開始 → 完了後に次スライドへ
      isTransitioning = true;
      speakText(slideSpeeches[currentSlide]).then(() => {
        isTransitioning = false;
        if (currentSlide < totalSlides - 1) {
          // 読み上げ完了後、少し間を置いて次のスライドへ
          autoTimer = setTimeout(nextSlide, MIN_SLIDE_DURATION);
        } else {
          // 最後のスライドで録画停止
          if (isRecording) {
            setTimeout(() => stopRecording(), 3000);
          }
        }

      if (currentSlide < totalSlides - 1) {

        goToSlide(currentSlide - 1);

    // =============================================

    function startBGM() {
      if (bgmPlaying) return;

      // メインボリューム

      // 神秘的なパッド音（和音）
      const chords = [

        [293.66, 369.99, 440.00], // D major
        [246.94, 311.13, 369.99], // B minor
        [220.00, 277.18, 329.63], // A minor
      ];

      let chordIndex = 0;

      function playChord() {
        if (!bgmPlaying) return;
        const chord = chords[chordIndex % chords.length];
        chordIndex++;

        chord.forEach(freq => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'sine';
          osc.frequency.value = freq;

          // フェードイン・フェードアウト
          gain.gain.setValueAtTime(0, audioCtx.currentTime);
          gain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 1);
          gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 4.5);

          osc.connect(gain);
          gain.connect(masterGain);
          osc.start(audioCtx.currentTime);
          osc.stop(audioCtx.currentTime + 5);
          bgmNodes.push(osc, gain);

        sparkle.type = 'sine';
        sparkle.frequency.value = chord[2] * 2;
        sparkleGain.gain.setValueAtTime(0, audioCtx.currentTime);
        sparkleGain.gain.linearRampToValueAtTime(0.08, audioCtx.currentTime + 0.5);
        sparkleGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 3);
        sparkle.connect(sparkleGain);
        sparkleGain.connect(masterGain);
        sparkle.start(audioCtx.currentTime);
        sparkle.stop(audioCtx.currentTime + 3.5);
        bgmNodes.push(sparkle, sparkleGain);

        setTimeout(playChord, 5000);
      }

      // ベース音（低音の持続音）
      const bassOsc = audioCtx.createOscillator();
      const bassGain = audioCtx.createGain();
      bassOsc.type = 'sine';
      bassOsc.frequency.value = 65.41; // C2
      bassGain.gain.value = 0.12;
      bassOsc.connect(bassGain);
      bassGain.connect(masterGain);
      bassOsc.start();
      bgmNodes.push(bassOsc, bassGain);

        if (!bgmPlaying) return;
        const bellFreqs = [523.25, 659.25, 783.99, 1046.50, 1318.51];
        const freq = bellFreqs[Math.floor(Math.random() * bellFreqs.length)];

        bell.type = 'sine';

        bell.connect(bellGain);
        bellGain.connect(masterGain);
        bell.start(audioCtx.currentTime);
        bell.stop(audioCtx.currentTime + 2.5);
        bgmNodes.push(bell, bellGain);

        setTimeout(playBell, 2000 + Math.random() * 3000);
      }

      playChord();
      setTimeout(playBell, 1000);
    }

      bgmNodes = [];
      if (audioCtx) {

      const ctx = canvas.getContext('2d');

      // 映像ストリーム
      const videoStream = canvas.captureStream(30);

      // 音声トラックを映像ストリームに追加
      audioDest.stream.getAudioTracks().forEach(track => {
        videoStream.addTrack(track);
      });

      // MediaRecorder
      const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9,opus')
        ? 'video/webm;codecs=vp9,opus'
        : 'video/webm';

      mediaRecorder = new MediaRecorder(videoStream, {
        mimeType: mimeType,
        videoBitsPerSecond: 5000000,
      });

      recordedChunks = [];
      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) recordedChunks.push(e.data);
      };

      mediaRecorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: mimeType });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `占い_${year}${String(month).padStart(2,'0')}${String(day).padStart(2,'0')}.webm`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      };

      // ボタン非表示にしてから録画開始
      btn.classList.add('hide-for-record');
      isRecording = true;

      mediaRecorder.start();

      // html2canvasでフレームキャプチャ（15fps）
      captureInterval = setInterval(async () => {
        try {
          const capturedCanvas = await html2canvas(container, {
            backgroundColor: '#0a0014',
            scale: 1,
            logging: false,
            useCORS: true,
          });
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(capturedCanvas, 0, 0, canvas.width, canvas.height);
        } catch(e) {}
      }, 66); // 約15fps

      // 少し待ってから読み上げ→自動遷移開始
      setTimeout(() => {
        speakText(slideSpeeches[0]).then(() => {
          autoTimer = setTimeout(nextSlide, MIN_SLIDE_DURATION);
        });
      }, 500);
    }

    function stopRecording() {
      isRecording = false;
      isTransitioning = false;
      stopSpeech();
      const btn = document.getElementById('recordBtn');
      const label = document.getElementById('recordLabel');

      if (captureInterval) {
        clearInterval(captureInterval);
        captureInterval = null;
      }

      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
      }

      stopBGM();

      // ボタンを再表示
      btn.classList.remove('hide-for-record');
      btn.classList.remove('recording');
      label.textContent = 'MP4録画';

      clearInterval(autoTimer);
    }
  </script>
</body>
</html>
