<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>バーコードスキャナー</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Kaku Gothic ProN', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #1e293b, #334155);
            padding: 1rem 1.5rem;
            text-align: center;
            border-bottom: 1px solid #475569;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 { font-size: 1.3rem; font-weight: 700; color: #f8fafc; }
        .subtitle { font-size: 0.75rem; color: #94a3b8; margin-top: 0.2rem; }

        main { max-width: 600px; margin: 0 auto; padding: 1rem; }

        .tab-bar { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        .tab-btn {
            flex: 1; padding: 0.6rem; border: 1px solid #334155; border-radius: 10px;
            background: #1e293b; color: #94a3b8; font-size: 0.85rem; font-weight: 600;
            cursor: pointer; text-align: center;
        }
        .tab-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* カメラ */
        .camera-wrap {
            position: relative;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        #video {
            width: 100%;
            display: block;
        }

        .scan-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 220px; height: 80px;
            border: 2px solid #fbbf24;
            border-radius: 8px;
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.4);
        }

        .scan-hint {
            position: absolute;
            bottom: 12px;
            width: 100%;
            text-align: center;
            color: #fbbf24;
            font-size: 0.75rem;
            font-weight: 600;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }

        .btn-group { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        .btn {
            flex: 1; padding: 0.75rem; border: none; border-radius: 10px;
            font-size: 0.9rem; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 0.3rem;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; }
        .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }

        .divider { text-align: center; color: #64748b; font-size: 0.75rem; padding: 0.4rem 0; }

        .manual-input { margin-bottom: 1rem; }
        .input-row { display: flex; gap: 0.5rem; }
        .input-row input {
            flex: 1; padding: 0.65rem 0.8rem; border: 1px solid #475569; border-radius: 10px;
            background: #1e293b; color: #e2e8f0; font-size: 0.9rem; outline: none;
        }
        .input-row input:focus { border-color: #3b82f6; }
        .input-row input::placeholder { color: #64748b; }
        .btn-search {
            padding: 0.65rem 1rem; background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white; border: none; border-radius: 10px; font-size: 0.85rem;
            font-weight: 600; cursor: pointer; white-space: nowrap;
        }

        /* 登録フォーム */
        .card {
            background: #1e293b; border-radius: 14px; border: 1px solid #334155;
            padding: 1.2rem; animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card h3 { font-size: 1.05rem; color: #f8fafc; margin-bottom: 0.3rem; }
        .barcode-tag {
            display: inline-block; background: #0f172a; padding: 0.25rem 0.6rem;
            border-radius: 6px; font-size: 0.8rem; color: #94a3b8;
            font-family: 'Courier New', monospace; margin-bottom: 1rem;
        }
        .form-group { margin-bottom: 0.8rem; }
        .form-group label {
            display: block; font-size: 0.75rem; color: #94a3b8;
            margin-bottom: 0.3rem; font-weight: 600;
        }
        .form-group input {
            width: 100%; padding: 0.65rem 0.8rem; border: 1px solid #475569;
            border-radius: 10px; background: #0f172a; color: #e2e8f0;
            font-size: 0.9rem; outline: none;
        }
        .form-group input:focus { border-color: #3b82f6; }
        .form-group input::placeholder { color: #64748b; }
        .price-wrap { position: relative; }
        .price-wrap::before {
            content: '¥'; position: absolute; left: 0.8rem; top: 50%;
            transform: translateY(-50%); color: #fbbf24; font-weight: 700;
        }
        .price-wrap input { padding-left: 1.8rem; color: #fbbf24; font-weight: 700; }
        .btn-register {
            width: 100%; padding: 0.8rem; background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #1a1a2e; border: none; border-radius: 10px; font-size: 0.95rem;
            font-weight: 700; cursor: pointer; margin-top: 0.3rem;
        }

        /* 商品表示 */
        .product-name { font-size: 1.2rem; font-weight: 700; color: #f8fafc; margin-bottom: 0.2rem; }
        .product-price { font-size: 2rem; font-weight: 800; color: #fbbf24; margin: 0.5rem 0; }
        .product-price .yen { font-size: 1.2rem; }
        .meta-item {
            display: flex; justify-content: space-between; padding: 0.5rem 0.7rem;
            background: #0f172a; border-radius: 8px; font-size: 0.8rem; margin-bottom: 0.4rem;
        }
        .meta-item .label { color: #94a3b8; }
        .meta-item .value { color: #e2e8f0; font-weight: 500; }
        .product-actions { display: flex; gap: 0.5rem; margin-top: 0.8rem; }
        .btn-edit {
            flex: 1; padding: 0.6rem; background: #334155; color: #cbd5e1;
            border: none; border-radius: 10px; font-size: 0.8rem; font-weight: 600; cursor: pointer;
        }
        .btn-delete {
            padding: 0.6rem 0.8rem; background: #ef44441a; color: #f87171;
            border: 1px solid #ef44444d; border-radius: 10px; font-size: 0.8rem;
            font-weight: 600; cursor: pointer;
        }

        /* 一覧 */
        .search-bar { margin-bottom: 0.8rem; }
        .search-bar input {
            width: 100%; padding: 0.65rem 0.8rem; border: 1px solid #334155;
            border-radius: 10px; background: #1e293b; color: #e2e8f0;
            font-size: 0.85rem; outline: none;
        }
        .search-bar input:focus { border-color: #3b82f6; }
        .search-bar input::placeholder { color: #64748b; }
        .list-summary { font-size: 0.75rem; color: #64748b; margin-bottom: 0.5rem; }
        .product-list { display: flex; flex-direction: column; gap: 0.4rem; }
        .product-list-item {
            background: #1e293b; border: 1px solid #334155; border-radius: 10px;
            padding: 0.7rem 0.8rem; display: flex; align-items: center; gap: 0.6rem;
            cursor: pointer; transition: background 0.2s;
        }
        .product-list-item:hover { background: #263043; }
        .product-list-icon {
            width: 36px; height: 36px; border-radius: 8px;
            background: #0f172a; display: flex; align-items: center;
            justify-content: center; font-size: 1.1rem; flex-shrink: 0;
        }
        .product-list-info { flex: 1; min-width: 0; }
        .product-list-name {
            font-size: 0.85rem; font-weight: 600; color: #e2e8f0;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .product-list-barcode { font-size: 0.65rem; color: #64748b; font-family: monospace; }
        .product-list-price { font-size: 0.95rem; font-weight: 700; color: #fbbf24; white-space: nowrap; }

        .empty-state { text-align: center; padding: 2.5rem 1rem; color: #64748b; }
        .empty-state .icon { font-size: 2.5rem; margin-bottom: 0.5rem; opacity: 0.5; }
        .empty-state h3 { color: #94a3b8; margin-bottom: 0.3rem; font-size: 0.95rem; }
        .empty-state p { font-size: 0.8rem; line-height: 1.4; }

        .toast {
            position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(80px);
            background: #065f46; color: #6ee7b7; padding: 0.7rem 1.2rem; border-radius: 10px;
            font-size: 0.85rem; font-weight: 600; z-index: 200; transition: transform 0.3s;
            white-space: nowrap;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* デバッグ */
        .debug-bar {
            background: #1a1a2e; border: 1px solid #fbbf2466; border-radius: 8px;
            padding: 0.5rem 0.7rem; margin-bottom: 0.8rem; font-size: 0.7rem;
            font-family: monospace; color: #94a3b8;
        }
        .debug-bar strong { color: #fbbf24; }
        .debug-bar .ok { color: #6ee7b7; }
        .debug-bar .ng { color: #f87171; }
    </style>
</head>
<body>
    <header>
        <h1>📷 バーコードスキャナー</h1>
        <p class="subtitle">スキャンして商品情報・価格を管理</p>
    </header>

    <main>
        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('scan')">📸 スキャン</button>
            <button class="tab-btn" onclick="switchTab('list')">📋 商品一覧 (<span id="countBadge">0</span>)</button>
        </div>

        <div id="tabScan" class="tab-content active">
            <!-- カメラ -->
            <div class="camera-wrap" id="cameraWrap" style="display:none;">
                <video id="video" autoplay playsinline></video>
                <div class="scan-overlay"></div>
                <div id="scanStatus" style="position:absolute;top:10px;left:0;width:100%;text-align:center;color:#6ee7b7;font-size:0.75rem;font-weight:600;text-shadow:0 1px 3px rgba(0,0,0,0.8);"></div>
                <div class="scan-hint">バーコードを枠に合わせてください</div>
            </div>
            <canvas id="canvas" style="display:none;"></canvas>
            <!-- html5-qrcode フォールバック用 -->
            <div id="qrReader" style="display:none; border-radius:12px; overflow:hidden; margin-bottom:1rem;"></div>

            <div class="btn-group">
                <button id="startBtn" class="btn btn-primary" onclick="startCamera()">▶ スキャン開始</button>
                <button id="stopBtn" class="btn btn-danger" onclick="stopCamera()" style="display:none;">■ 停止</button>
            </div>

            <div class="divider">── または手入力 ──</div>
            <div class="manual-input">
                <div class="input-row">
                    <input type="text" id="barcodeInput" placeholder="バーコード番号" inputmode="numeric"
                           onkeydown="if(event.key==='Enter') manualLookup()">
                    <button class="btn-search" onclick="manualLookup()">検索</button>
                </div>
            </div>

            <div id="resultArea"></div>
        </div>

        <div id="tabList" class="tab-content">
            <div class="search-bar">
                <input type="text" id="listSearch" placeholder="商品名・バーコードで検索..." oninput="renderList()">
            </div>
            <div id="listArea"></div>
        </div>
    </main>

    <div id="toast" class="toast"></div>

    <script>
        // ---- データ管理 ----
        function loadProducts() {
            try {
                return JSON.parse(localStorage.getItem('products') || '{}');
            } catch(e) {
                return {};
            }
        }

        function saveProducts(data) {
            try {
                localStorage.setItem('products', JSON.stringify(data));
                return true;
            } catch(e) {
                return false;
            }
        }

        let products = loadProducts();
        updateCount();

        // ---- カメラ & スキャン ----
        let stream = null;
        let scanning = false;
        let scanInterval = null;
        let detector = null;
        let html5QrCode = null;

        // 確認画面で修正できるので1回読めたら即確定
        const CONFIRM_COUNT = 1;
        let lastCode = '';
        let sameCount = 0;

        async function startCamera() {
            lastCode = '';
            sameCount = 0;
            updateScanStatus('');

            // BarcodeDetector対応ブラウザ（主にChrome）
            if ('BarcodeDetector' in window) {
                try {
                    stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
                    });
                    const video = document.getElementById('video');
                    video.srcObject = stream;
                    await video.play();

                    document.getElementById('cameraWrap').style.display = 'block';
                    document.getElementById('startBtn').style.display = 'none';
                    document.getElementById('stopBtn').style.display = 'flex';

                    detector = new BarcodeDetector({ formats: ['ean_13', 'ean_8', 'upc_a', 'upc_e', 'code_128'] });
                    scanning = true;
                    scanLoop();
                } catch(e) {
                    showResult('<div class="card"><h3>⚠️ カメラエラー</h3><p style="color:#94a3b8;margin-top:0.5rem;">カメラへのアクセスを許可してください。</p></div>');
                }
            } else {
                // フォールバック: html5-qrcode を使用（Safari等）
                startHtml5QrCode();
            }
        }

        function startHtml5QrCode() {
            document.getElementById('cameraWrap').style.display = 'none';
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'flex';

            // html5-qrcode 用の読み取りエリアを表示
            const readerEl = document.getElementById('qrReader');
            readerEl.style.display = 'block';

            html5QrCode = new Html5Qrcode('qrReader');
            html5QrCode.start(
                { facingMode: 'environment' },
                {
                    fps: 15,
                    qrbox: { width: 200, height: 100 },
                    aspectRatio: 1.5,
                    formatsToSupport: [
                        Html5QrcodeSupportedFormats.EAN_13,
                        Html5QrcodeSupportedFormats.EAN_8,
                        Html5QrcodeSupportedFormats.UPC_A,
                        Html5QrcodeSupportedFormats.UPC_E,
                        Html5QrcodeSupportedFormats.CODE_128
                    ]
                },
                (code) => {
                    // 安定スキャン: 同じ値が連続3回
                    if (code === lastCode) {
                        sameCount++;
                    } else {
                        lastCode = code;
                        sameCount = 1;
                    }
                    if (sameCount >= CONFIRM_COUNT) {
                        if (navigator.vibrate) navigator.vibrate(80);
                        stopCamera();
                        showConfirm(code);
                    }
                },
                () => {}
            ).catch(() => {
                showResult('<div class="card"><h3>⚠️ カメラエラー</h3><p style="color:#94a3b8;margin-top:0.5rem;">カメラへのアクセスを許可してください。</p></div>');
                stopCamera();
            });
        }

        function stopCamera() {
            scanning = false;
            if (scanInterval) { clearTimeout(scanInterval); scanInterval = null; }
            if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
            if (html5QrCode) {
                html5QrCode.stop().catch(() => {}).finally(() => {
                    html5QrCode.clear();
                    html5QrCode = null;
                    document.getElementById('qrReader').style.display = 'none';
                    document.getElementById('qrReader').innerHTML = '';
                });
            }
            document.getElementById('cameraWrap').style.display = 'none';
            document.getElementById('startBtn').style.display = 'flex';
            document.getElementById('stopBtn').style.display = 'none';
            updateScanStatus('');
            lastCode = '';
            sameCount = 0;
        }

        function updateScanStatus(msg) {
            const el = document.getElementById('scanStatus');
            if (el) el.innerHTML = msg;
        }

        async function scanLoop() {
            if (!scanning || !detector) return;

            const video = document.getElementById('video');
            try {
                const barcodes = await detector.detect(video);
                if (barcodes.length > 0) {
                    const code = barcodes[0].rawValue;
                    if (code) {
                        if (code === lastCode) {
                            sameCount++;
                        } else {
                            lastCode = code;
                            sameCount = 1;
                        }
                        const dots = '●'.repeat(sameCount) + '○'.repeat(Math.max(0, CONFIRM_COUNT - sameCount));
                        updateScanStatus(`読取中: ${code} ${dots}`);

                        if (sameCount >= CONFIRM_COUNT) {
                            if (navigator.vibrate) navigator.vibrate(80);
                            stopCamera();
                            showConfirm(code);
                            return;
                        }
                    }
                }
            } catch(e) {}

            scanInterval = setTimeout(scanLoop, 50);
        }

        // スキャン結果を確認させてから処理に進む
        function showConfirm(barcode) {
            products = loadProducts();
            const found = !!products[barcode];

            showResult(`
                <div class="card">
                    <h3>📷 スキャン結果</h3>
                    <p style="color:#94a3b8; font-size:0.8rem; margin-bottom:0.6rem;">番号が正しいか確認してください。違う場合は修正できます。</p>
                    <div class="form-group">
                        <label>バーコード番号</label>
                        <input type="text" id="confirmBarcode" value="${barcode}" style="font-family:monospace; font-size:1.1rem; font-weight:700; letter-spacing:0.05em;">
                    </div>
                    ${found ? '<p style="color:#6ee7b7; font-size:0.85rem; font-weight:600;">✅ この商品は登録済みです</p>' : '<p style="color:#fbbf24; font-size:0.85rem;">🆕 未登録の商品です</p>'}
                    <div style="display:flex; gap:0.5rem; margin-top:0.8rem;">
                        <button class="btn-register" onclick="confirmAndProceed()">OK</button>
                        <button class="btn-edit" onclick="startCamera()" style="flex:0 0 auto; padding:0.8rem 1.2rem;">再スキャン</button>
                    </div>
                </div>
            `);
        }

        function confirmAndProceed() {
            const input = document.getElementById('confirmBarcode');
            const barcode = (input?.value || '').trim();
            if (!barcode) return;
            handleBarcode(barcode);
        }

        // ---- バーコード処理 ----
        function manualLookup() {
            const input = document.getElementById('barcodeInput');
            const code = input.value.trim();
            if (!code) return;
            input.value = '';
            handleBarcode(code);
        }

        function handleBarcode(barcode) {
            barcode = barcode.trim();

            // 毎回localStorageから読み直す
            products = loadProducts();
            const registered = Object.keys(products);
            const found = !!products[barcode];

            // デバッグ表示
            const debug = `<div class="debug-bar">
                <strong>スキャン:</strong> "${barcode}" (${barcode.length}桁)
                | <strong>登録済み:</strong> ${found ? '<span class="ok">YES</span>' : '<span class="ng">NO</span>'}
                | <strong>保存数:</strong> ${registered.length}件
                ${registered.length > 0 ? '<br>保存済み: ' + registered.map(b => '"' + b + '"').join(', ') : ''}
            </div>`;

            if (found) {
                showProductCard(barcode, debug);
            } else {
                showRegisterForm(barcode, debug);
            }
        }

        // ---- 登録フォーム ----
        function showRegisterForm(barcode, debug) {
            showResult(`
                ${debug || ''}
                <div class="card">
                    <h3>🆕 新しい商品</h3>
                    <span class="barcode-tag">${barcode}</span>
                    <div class="form-group">
                        <label>商品名 *</label>
                        <input type="text" id="regName" placeholder="例: おーいお茶 500ml">
                    </div>
                    <div class="form-group">
                        <label>価格（税込） *</label>
                        <div class="price-wrap">
                            <input type="number" id="regPrice" placeholder="150" inputmode="numeric">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>カテゴリ（任意）</label>
                        <input type="text" id="regCategory" placeholder="例: 飲料、食品、日用品">
                    </div>
                    <div class="form-group">
                        <label>メモ（任意）</label>
                        <input type="text" id="regMemo" placeholder="例: セール品">
                    </div>
                    <button class="btn-register" onclick="registerProduct('${barcode}')">💰 登録</button>
                </div>
            `);
            setTimeout(() => { const el = document.getElementById('regName'); if(el) el.focus(); }, 50);
        }

        // ---- 商品登録 ----
        function registerProduct(barcode) {
            const name = document.getElementById('regName').value.trim();
            const price = document.getElementById('regPrice').value.trim();
            const category = (document.getElementById('regCategory')?.value || '').trim();
            const memo = (document.getElementById('regMemo')?.value || '').trim();

            if (!name) { document.getElementById('regName').focus(); return; }
            if (!price || isNaN(price)) { document.getElementById('regPrice').focus(); return; }

            // 最新データに対して保存
            products = loadProducts();
            const now = new Date().toISOString();
            products[barcode] = {
                name,
                price: parseInt(price),
                category,
                memo,
                createdAt: products[barcode]?.createdAt || now,
                updatedAt: now
            };

            const ok = saveProducts(products);
            if (ok) {
                // 保存確認のため再読込
                const verify = loadProducts();
                if (verify[barcode]) {
                    showToast(`✅ ${name} を保存しました`);
                    showProductCard(barcode);
                    updateCount();
                } else {
                    showToast('⚠️ 保存に失敗しました');
                }
            } else {
                showToast('⚠️ ストレージへの保存に失敗しました');
            }
        }

        // ---- 商品カード表示 ----
        function showProductCard(barcode, debug) {
            products = loadProducts();
            const p = products[barcode];
            if (!p) { showRegisterForm(barcode, debug); return; }

            showResult(`
                ${debug || ''}
                <div class="card">
                    <h3 class="product-name">${esc(p.name)}</h3>
                    <span class="barcode-tag">${barcode}</span>
                    <div class="product-price"><span class="yen">¥</span>${Number(p.price).toLocaleString()}</div>
                    ${p.category ? `<div class="meta-item"><span class="label">カテゴリ</span><span class="value">${esc(p.category)}</span></div>` : ''}
                    ${p.memo ? `<div class="meta-item"><span class="label">メモ</span><span class="value">${esc(p.memo)}</span></div>` : ''}
                    <div class="meta-item"><span class="label">登録日</span><span class="value">${fmtDate(p.createdAt)}</span></div>
                    <div class="product-actions">
                        <button class="btn-edit" onclick="editProduct('${barcode}')">✏️ 編集</button>
                        <button class="btn-delete" onclick="deleteProduct('${barcode}')">🗑 削除</button>
                    </div>
                </div>
            `);
        }

        // ---- 編集 ----
        function editProduct(barcode) {
            const p = products[barcode];
            if (!p) return;
            showResult(`
                <div class="card">
                    <h3>✏️ 商品を編集</h3>
                    <span class="barcode-tag">${barcode}</span>
                    <div class="form-group">
                        <label>商品名 *</label>
                        <input type="text" id="regName" value="${esc(p.name)}">
                    </div>
                    <div class="form-group">
                        <label>価格（税込） *</label>
                        <div class="price-wrap">
                            <input type="number" id="regPrice" value="${p.price}" inputmode="numeric">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>カテゴリ</label>
                        <input type="text" id="regCategory" value="${esc(p.category)}">
                    </div>
                    <div class="form-group">
                        <label>メモ</label>
                        <input type="text" id="regMemo" value="${esc(p.memo)}">
                    </div>
                    <button class="btn-register" onclick="registerProduct('${barcode}')">💰 更新</button>
                </div>
            `);
        }

        // ---- 削除 ----
        function deleteProduct(barcode) {
            const name = products[barcode]?.name || '';
            if (!confirm(`「${name}」を削除しますか？`)) return;
            products = loadProducts();
            delete products[barcode];
            saveProducts(products);
            showToast(`${name} を削除しました`);
            showResult('');
            updateCount();
        }

        // ---- 商品一覧 ----
        function renderList() {
            const area = document.getElementById('listArea');
            products = loadProducts();
            const search = (document.getElementById('listSearch')?.value || '').toLowerCase();
            const entries = Object.entries(products)
                .filter(([b, p]) => !search || p.name.toLowerCase().includes(search) || b.includes(search))
                .sort((a, b) => (b[1].updatedAt || '').localeCompare(a[1].updatedAt || ''));

            if (Object.keys(products).length === 0) {
                area.innerHTML = '<div class="empty-state"><div class="icon">📦</div><h3>商品が未登録です</h3><p>スキャンタブからバーコードを<br>読み取って登録しましょう</p></div>';
                return;
            }

            let html = `<div class="list-summary">${entries.length}件</div><div class="product-list">`;
            for (const [b, p] of entries) {
                html += `
                    <div class="product-list-item" onclick="switchTab('scan');setTimeout(()=>showProductCard('${b}'),50)">
                        <div class="product-list-icon">📦</div>
                        <div class="product-list-info">
                            <div class="product-list-name">${esc(p.name)}</div>
                            <div class="product-list-barcode">${b}</div>
                        </div>
                        <div class="product-list-price">¥${Number(p.price).toLocaleString()}</div>
                    </div>`;
            }
            area.innerHTML = html + '</div>';
        }

        // ---- ユーティリティ ----
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach((b, i) =>
                b.classList.toggle('active', (tab === 'scan' && i === 0) || (tab === 'list' && i === 1)));
            document.getElementById('tabScan').classList.toggle('active', tab === 'scan');
            document.getElementById('tabList').classList.toggle('active', tab === 'list');
            if (tab === 'list') renderList();
        }

        function showResult(html) { document.getElementById('resultArea').innerHTML = html; }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        function updateCount() {
            const el = document.getElementById('countBadge');
            if (el) el.textContent = Object.keys(loadProducts()).length;
        }

        function fmtDate(iso) {
            if (!iso) return '-';
            const d = new Date(iso);
            return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
        }

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s || '';
            return d.innerHTML;
        }
    </script>
</body>
</html>
